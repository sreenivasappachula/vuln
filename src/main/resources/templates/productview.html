<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Documents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>


<label>Current Product : </label><input type="display" id="product" th:value="${product}" style="border: none">

<button th:if="${role != null and !role.equalsIgnoreCase('ENGINEER')}" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#DocumentModal">
    Create Document
</button>




  <br>      <!-- end of popup -->
<h12>list of Documents</h1>
  <table>
    
     <thead>
                
      <tr th:each="document : ${documents}">
        
        <li><a th:href="@{/document-view(ReferenceID=${document.ReferenceID})}"
                th:text="${document.Doc_Name}">
        </a>
        </li>
        
      </tr>
       
    </thead>
       
</table>












<!-- Modal --><div class="modal fade" id="DocumentModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Create Document</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="mb-3">
          <label>Number</label>
          <input type="number" id="number" class="form-control">
        </div>

        <div class="mb-3">
          <label>Name</label>
          <input type="text" id="name" class="form-control">
        </div>

        <div class="mb-3">
          <label>Description</label>
          <input type="text" id="description" class="form-control">
        </div>

        <div class="mb-3">
          <label>File</label>
          <input type="file" id="file" class="form-control">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="createDocument()">Save</button>
      </div>

    </div>
  </div>
</div>
</body>

<script>
async function createDocument() {
  
    const file = document.getElementById("file").files[0];

    if (!file) {
        alert("File required");
        return;
    }

   const data = {
    docNumber: document.getElementById("number").value,
    docName: document.getElementById("name").value,
    description: document.getElementById("description").value,
    productName: document.getElementById("product").value
};

    const formData = new FormData();
    formData.append("data", new Blob([JSON.stringify(data)], { type: "application/json" }));
    formData.append("file", file);

    try {
        const response = await fetch("http://localhost:8080/api/upload", {
            method: "POST",
            body: formData
        });

        const result = await response.text();
        alert(result);

    } catch (e) {
        console.error(e);
        alert("Upload failed");
    }
}
</script>

</html>
