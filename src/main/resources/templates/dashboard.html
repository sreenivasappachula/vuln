<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<h1>Dashboard</h1>
<h2>logged as user: <span th:text="${user}">Username</span></h2>
<!-- Button to open popup -->
<button  th:if="${role != null and role.equalsIgnoreCase('admin')}" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">
    Create Product
</button>

<br>
    <a th:href="@{/all-products}"> View Products</a>
<br>  

    <a th:if="${role != null and role.equalsIgnoreCase('admin')}" th:href="@{/user-management}"> User Management</a>

<!-- Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Create Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="mb-3">
          <label>Name</label>
          <input type="text" id="name" class="form-control">
        </div>

        <div class="mb-3">
          <label>description</label>
          <input type="text" id="description" class="form-control">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="submitProduct()">Save</button>
      </div>

    </div>
  </div>
</div>
</body>


<script>
function submitProduct() {

    const product = {
        name: document.getElementById("name").value,
        description: document.getElementById("description").value
    };

    fetch('/api/products', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(product)
    })
    .then(response => response.json())
    .then(success => {
      if (success) {
        alert("Product Created Successfully");

        // clear fields
        document.getElementById("name").value = "";
        document.getElementById("description").value = "";

        // close modal
        const modal = bootstrap.Modal.getInstance(document.getElementById('productModal'));
        modal.hide();

        // reload page (optional)
        location.reload();} else {
            alert("Failed to create product");
        }
    })
    .catch(error => {
        console.error("Error:", error);
    });
}
</script>
</html>
