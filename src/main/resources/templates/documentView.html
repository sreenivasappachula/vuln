<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Documents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

 <h1>Document Details</h1>
 <table th:each="document : ${document}">
     <thead>
                
      <tr>
          <th>Reference ID : </th><td th:text="${document.ReferenceID}">Reference ID</td>
     </tr>
      <tr >
          <th>Document Name :</th><td th:text="${document.Doc_Name}">Document Name</td>
    </tr>
    
    <tr >
          <th>Document Revision :</th><td th:text="${document.Revision}">Document Revision</td>
    </tr>
    <tr >
          <th>Document Description :</th><td th:text="${document.Description}">Document Description</td>
    </tr>
      <tr >
          <th>Document Author :</th><td th:text="${document.DocumentAuthor}">Document Author</td>
    </tr>
      <tr >
          <th>Document Created Date :</th><td th:text="${document.CreatedDate}">Document Created Date</td>
    </tr>
      <tr >
          <th>Document Modified Date :</th><td th:text="${document.ModifiedDate}">Document Modified Date</td>
    </tr>
  
    <tr> 
        <td><a th:href="@{/download/{id}(id=${document.referenceID})}"    class="btn btn-primary">    Download</a></td>
    </tr>

    </thead>
    
</table>    

</body>

</html>
